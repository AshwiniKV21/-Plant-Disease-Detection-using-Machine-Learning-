<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Plant Disease Detection{% endblock %}</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"  rel="stylesheet"/>
  <style>
    :root {
      --primary:   #2d6a4f;
      --secondary: #1b4332;
      --accent:    #95d5b2;
      --light-bg:  #f8faf5;
      --warn:      #e76f51;
    }
    body { background: var(--light-bg); font-family: 'Segoe UI', sans-serif; }

    .navbar { background: var(--secondary); box-shadow: 0 2px 12px rgba(0,0,0,.25); }
    .navbar-brand { color: var(--accent) !important; font-weight: 700; font-size: 1.4rem; }
    .nav-link { color: #cde9d8 !important; transition: color .2s; }
    .nav-link:hover, .nav-link.active { color: #fff !important; }

    .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .card-header { border-radius: 16px 16px 0 0 !important; }

    .btn-leaf { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-leaf:hover { background: var(--secondary); color: #fff; }

    footer { background: var(--secondary); color: #b7d9c6; padding: 20px 0; margin-top: 60px; text-align: center; }

    @keyframes sway {
      0%,100% { transform: rotate(-4deg); }
      50%     { transform: rotate(4deg); }
    }
    .leaf-icon { animation: sway 2.5s ease-in-out infinite; display: inline-block; transform-origin: bottom center; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">
      <span class="leaf-icon"><i class="fas fa-leaf"></i></span>
      LeafCare AI
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/history/"><i class="fas fa-history me-1"></i>History</a></li>
        <li class="nav-item"><a class="nav-link" href="/about/"><i class="fas fa-info-circle me-1"></i>About</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

<footer>
  <p class="mb-0"><i class="fas fa-seedling text-success me-2"></i>LeafCare AI &copy; 2025 — Plant Disease Detection System</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
